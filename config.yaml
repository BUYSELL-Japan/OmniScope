capture:
  output_dir: screenshots
  save_locally: true
chrome:
  debug_host: localhost
  debug_port: 9222
gemini:
  api_key: ''
  auto_analyze: true
  default_prompt: このWebページのスクリーンショットを分析してください。レイアウト、コンテンツ、主要な情報を詳しく説明してください。
  model: gemini-2.0-flash
  system_prompt: ''
hotkeys:
  capture: ctrl+shift+s
  monitor_1: ctrl+shift+1
  monitor_2: ctrl+shift+2
  monitor_3: ctrl+shift+3
monitors:
  auto_detect: true
  default: 2
  manual:
    1:
      height: 1050
      width: 1680
      x: 0
      y: 0
    2:
      height: 1050
      width: 1680
      x: 1680
      y: 0
    3:
      height: 1050
      width: 1680
      x: 3360
      y: 0
